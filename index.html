  {id:'tD',label:'Accompagnement online',format:'Programme + appels hebdo',prix:180,unite:'mois',color:'#f5631e',active:true},
  {id:'tE',label:'Pack 5 séances',format:'Présentiel · 5x1h',prix:350,unite:'pack',color:'#e11d6b',active:true},
];
const OUTILS=[
  {nom:'SumUp',cat:'Encaissement CB',desc:'Terminal CB mobile, idéal en présentiel ou déplacement.',tarif:'1,69% / transaction · Terminal 59 €',url:'https://sumup.fr'},
  {nom:'Stripe',cat:'Paiements en ligne',desc:'Liens de paiement, abonnements, factures automatiques.',tarif:'1,5% + 0,25 € / transaction',url:'https://stripe.com'},
  {nom:'Indy',cat:'Comptabilité',desc:'Comptabilité tout-en-un pour indépendants, déclarations auto.',tarif:'27 €/mois',url:'https://indy.fr'},
  {nom:'Freebe',cat:'Facturation',desc:'Devis, factures et relances pour freelances.',tarif:'Gratuit (base)',url:'https://freebe.fr'},
  {nom:'Dougs',cat:'Expert-comptable',desc:'Expert-comptable en ligne dédié indépendants.',tarif:'À partir de 49 €/mois',url:'https://dougs.fr'},
];

/* ── STORE ── */
const LS='pb-prep-v2';
function loadState(){try{const s=localStorage.getItem(LS);if(s){const p=JSON.parse(s);if(!p.tests)p.tests=[];return p;}}catch(e){}return{clients:[],sessions:[],paiements:[],tarifs:DEFAULT_TARIFS,tests:[],settings:{coachName:'Pierrick Briend',objectifMensuel:4600}};}
function saveState(s){try{localStorage.setItem(LS,JSON.stringify(s));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

/* ── GOOGLE DRIVE SYNC ──
   Le localStorage reste la source de vérité rapide et hors-ligne.
   Drive sert de sauvegarde miroir + synchronisation entre appareils.
   Fichier unique sur Drive : "psb-prep-data.json" (espace appDataFolder, invisible
   dans le Drive normal de l'utilisateur, pour ne jamais polluer son arborescence). */
const DRIVE_CLIENT_ID='457374538480-rnva94oftum6mge56cbmv0ouf0252gqs.apps.googleusercontent.com';
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILENAME='psb-prep-data.json';
const LS_DRIVE_META='pb-drive-meta'; // {fileId, lastSync}

function loadDriveMeta(){try{return JSON.parse(localStorage.getItem(LS_DRIVE_META)||'{}');}catch{return{};}}
function saveDriveMeta(m){try{localStorage.setItem(LS_DRIVE_META,JSON.stringify(m));}catch(e){}}

function useDriveSync(state,setState){
  const [driveStatus,setDriveStatus]=React.useState('disconnected'); // disconnected | connecting | connected | syncing | error
  const [driveError,setDriveError]=React.useState(null);
  const [lastSync,setLastSync]=React.useState(loadDriveMeta().lastSync||null);
  const tokenClientRef=React.useRef(null);
  const accessTokenRef=React.useRef(null);
  const gapiReadyRef=React.useRef(false);

  // Initialise le client gapi (une seule fois)
  const ensureGapi=React.useCallback(()=>{
    return new Promise((resolve,reject)=>{
      if(gapiReadyRef.current){resolve();return;}
      if(typeof gapi==='undefined'){reject(new Error('Google API non chargée'));return;}
      gapi.load('client',async()=>{
        try{
          await gapi.client.init({});
          await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
          gapiReadyRef.current=true;
          resolve();
        }catch(e){reject(e);}
      });
    });
  },[]);

  const connect=React.useCallback(()=>{
    if(typeof google==='undefined'){setDriveError('Google Identity non chargée');setDriveStatus('error');return;}
    setDriveStatus('connecting');
    if(!tokenClientRef.current){
      tokenClientRef.current=google.accounts.oauth2.initTokenClient({
        client_id:DRIVE_CLIENT_ID,
        scope:DRIVE_SCOPE,
        callback:async(resp)=>{
          if(resp.error){setDriveError(resp.error);setDriveStatus('error');return;}
          accessTokenRef.current=resp.access_token;
          try{
            await ensureGapi();
            gapi.client.setToken({access_token:resp.access_token});
            setDriveStatus('connected');
            await pullFromDrive();
          }catch(e){setDriveError(e.message||'Erreur de connexion');setDriveStatus('error');}
        }
      });
    }
    tokenClientRef.current.requestAccessToken();
  },[ensureGapi]);

  const findOrCreateFile=React.useCallback(async()=>{
    const meta=loadDriveMeta();
    if(meta.fileId){
      try{
        await gapi.client.drive.files.get({fileId:meta.fileId,fields:'id'});
        return meta.fileId;
      }catch(e){/* fichier introuvable, on en recrée un */}
    }
    const res=await gapi.client.drive.files.list({
      spaces:'appDataFolder',
      q:`name='${DRIVE_FILENAME}'`,
      fields:'files(id,name)'
    });
    if(res.result.files&&res.result.files.length>0){
      const fileId=res.result.files[0].id;
      saveDriveMeta({...meta,fileId});
      return fileId;
    }
    const createRes=await gapi.client.drive.files.create({
      resource:{name:DRIVE_FILENAME,parents:['appDataFolder']},
      fields:'id'
    });
    const fileId=createRes.result.id;
    saveDriveMeta({...meta,fileId});
    return fileId;
  },[]);

  const pushToDrive=React.useCallback(async(s)=>{
    if(driveStatus!=='connected'&&driveStatus!=='syncing')return;
    try{
      setDriveStatus('syncing');
      const fileId=await findOrCreateFile();
      const payload=JSON.stringify({data:s,savedAt:new Date().toISOString()});
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+accessTokenRef.current,'Content-Type':'application/json'},
        body:payload
      });
      const now=new Date().toISOString();
      saveDriveMeta({...loadDriveMeta(),lastSync:now});
      setLastSync(now);
      setDriveStatus('connected');
    }catch(e){setDriveError(e.message||'Erreur de synchronisation');setDriveStatus('error');}
  },[driveStatus,findOrCreateFile]);

  const pullFromDrive=React.useCallback(async()=>{
    try{
      const fileId=await findOrCreateFile();
      const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
        headers:{'Authorization':'Bearer '+accessTokenRef.current}
      });
      if(!res.ok){if(res.status===404){return;} throw new Error('Lecture Drive échouée');}
      const text=await res.text();
      if(!text)return; // fichier vide, rien à récupérer
      const parsed=JSON.parse(text);
      if(parsed&&parsed.data){
        const localRaw=localStorage.getItem(LS);
        const localState=localRaw?JSON.parse(localRaw):null;
        // Ne propose le remplacement que si Drive contient des données ET que le local est vide ou plus ancien
        if(!localState||!localState.clients||localState.clients.length===0){
          setState(parsed.data);
          saveState(parsed.data);
        }
        const now=new Date().toISOString();
        saveDriveMeta({...loadDriveMeta(),lastSync:now});
        setLastSync(now);
      }
    }catch(e){setDriveError(e.message||'Erreur de lecture Drive');}
  },[findOrCreateFile,setState]);

  const disconnect=React.useCallback(()=>{
    if(accessTokenRef.current&&typeof google!=='undefined'){
      google.accounts.oauth2.revoke(accessTokenRef.current,()=>{});
    }
    accessTokenRef.current=null;
    setDriveStatus('disconnected');
  },[]);

  return{driveStatus,driveError,lastSync,connect,disconnect,pushToDrive};
}

const StoreCtx=React.createContext(null);
function StoreProvider({children}){
  const [state,setState]=React.useState(()=>loadState());
  const drive=useDriveSync(state,setState);
  const pushTimerRef=React.useRef(null);
  const update=React.useCallback(fn=>setState(s=>{
    const nx=fn(s);
    saveState(nx);
    // Synchro Drive différée (debounce 2s) pour ne pas spammer l'API à chaque frappe
    clearTimeout(pushTimerRef.current);
    pushTimerRef.current=setTimeout(()=>drive.pushToDrive(nx),2000);
    return nx;
  }),[drive]);
  const store=React.useMemo(()=>({
    state,
    drive,
    addClient:c=>update(s=>({...s,clients:[...s.clients,{...c,id:uid(),createdAt:new Date().toISOString()}]})),
    updateClient:(id,c)=>update(s=>({...s,clients:s.clients.map(x=>x.id===id?{...x,...c}:x)})),
    deleteClient:id=>update(s=>({...s,clients:s.clients.filter(x=>x.id!==id)})),
    addSession:sess=>update(s=>{
      const sessId=uid();
      const newSess={...sess,id:sessId,status:'upcoming',createdAt:new Date().toISOString()};
      const parts=sess.participants||[];
      const newPaiements=parts.filter(p=>p.clientId&&p.tarifId).map(p=>{
        const tarif=s.tarifs.find(t=>t.id===p.tarifId);
        return{id:uid(),clientId:p.clientId,tarifId:p.tarifId,tarifLabel:tarif?.label||'',montant:Number(tarif?.prix||0),date:sess.date||new Date().toISOString().slice(0,10),statut:'en attente',mode:'À définir',sessionId:sessId};
      });
      return{...s,sessions:[...s.sessions,newSess],paiements:[...s.paiements,...newPaiements]};
    }),
    updateSession:(id,sess)=>update(s=>({...s,sessions:s.sessions.map(x=>x.id===id?{...x,...sess}:x)})),
    deleteSession:id=>update(s=>({...s,sessions:s.sessions.filter(x=>x.id!==id)})),
    addPaiement:p=>update(s=>({...s,paiements:[...s.paiements,{...p,id:uid()}]})),
    updatePaiement:(id,p)=>update(s=>({...s,paiements:s.paiements.map(x=>x.id===id?{...x,...p}:x)})),
    updateTarif:(id,t)=>update(s=>({...s,tarifs:s.tarifs.map(x=>x.id===id?{...x,...t}:x)})),
    addTarif:t=>update(s=>({...s,tarifs:[...s.tarifs,{...t,id:uid()}]})),
    deleteTarif:id=>update(s=>({...s,tarifs:s.tarifs.filter(x=>x.id!==id)})),
    updateSettings:settings=>update(s=>({...s,settings:{...s.settings,...settings}})),
    addTest:t=>update(s=>({...s,tests:[...(s.tests||[]),{...t,id:uid(),createdAt:new Date().toISOString()}]})),
    deleteTest:id=>update(s=>({...s,tests:(s.tests||[]).filter(x=>x.id!==id)})),
  }),[state,update,drive]);
  return <StoreCtx.Provider value={store}>{children}</StoreCtx.Provider>;
}
function useStore(){return React.useContext(StoreCtx);}

/* ── ATOMS ── */
function Icon({n,s=16,c='currentColor',style={}}){
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current||!window.lucide?.icons)return;
    const key=n.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join('');
    const def=window.lucide.icons[key];if(!def)return;
    const el=window.lucide.createElement(def);
    el.setAttribute('width',s);el.setAttribute('height',s);el.setAttribute('stroke-width',2);
    ref.current.innerHTML='';ref.current.appendChild(el);
  },[n,s]);
  return <span ref={ref} style={{display:'inline-flex',width:s,height:s,color:c,flexShrink:0,...style}}/>;
}

const PAL=['#7733dd','#0f9d8a','#2f6bf2','#f5631e','#e11d6b','#e0a90b'];
const PALS=['#f5f1ff','#d6f5ef','#e7f0ff','#fff1eb','#ffe1ec','#fdf3d7'];
function Avatar({name='',size=40,status,style={}}){
  const i=(name.charCodeAt(0)||0)%PAL.length;
  const ini=name.trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
  const sc={online:'#16a34a',away:'#e0a90b',offline:'#939cab'};
  return(
    <span style={{position:'relative',display:'inline-flex',flexShrink:0,...style}}>
      <span style={{width:size,height:size,borderRadius:'50%',background:PALS[i],color:PAL[i],display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fd)',fontWeight:700,fontSize:size*.38,letterSpacing:'-.02em'}}>{ini}</span>
      {status&&<span style={{position:'absolute',bottom:0,right:0,width:Math.max(8,size*.26),height:Math.max(8,size*.26),borderRadius:'50%',background:sc[status]||sc.offline,border:'2px solid #fff'}}/>}
    </span>
  );
}

function Btn({onClick,variant='primary',size='md',icon,iconR,disabled,children,style={},full,type='button'}){
  const h=size==='sm'?32:size==='lg'?44:38;
  const px=size==='sm'?'0 12px':size==='lg'?'0 20px':'0 16px';
  const fs=size==='sm'?12.5:size==='lg'?15:13.5;
  const VS={
    primary:{background:'var(--v)',color:'#fff',border:'none',boxShadow:'0 1px 2px rgba(84,58,134,.3),0 2px 8px rgba(84,58,134,.18)'},
    secondary:{background:'#fff',color:'var(--n900)',border:'1px solid var(--n200)',boxShadow:'var(--sh-sm)'},
    ghost:{background:'transparent',color:'var(--n500)',border:'none',boxShadow:'none'},
    danger:{background:'var(--red)',color:'#fff',border:'none',boxShadow:'none'},
    ink:{background:'var(--ink)',color:'#fff',border:'none',boxShadow:'0 2px 10px rgba(0,0,0,.25)'},
  };
  const v=VS[variant]||VS.primary;
  return(
    <button type={type} onClick={onClick} disabled={disabled} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,height:h,padding:px,fontSize:fs,fontWeight:600,fontFamily:'var(--fb)',letterSpacing:'-.01em',borderRadius:'var(--rmd)',cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,whiteSpace:'nowrap',width:full?'100%':'auto',transition:'var(--tr)',...v,...style}}>
      {icon&&<Icon n={icon} s={size==='sm'?14:16} c="currentColor"/>}
      {children}
      {iconR&&<Icon n={iconR} s={size==='sm'?14:16} c="currentColor"/>}
    </button>
  );
}

function Tag({type}){
  const t=TYPES[type]||TYPES.force;
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px 2px 6px',background:t.soft,borderLeft:`2.5px solid ${t.color}`,borderRadius:4,fontSize:11,fontWeight:600,color:t.color,whiteSpace:'nowrap'}}>{t.label}</span>;
}

    <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'14px 16px',display:'flex',flexDirection:'column',gap:8,boxShadow:'var(--sh-sm)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:10.5,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--n400)'}}>{label}</span>

      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:4,whiteSpace:'nowrap'}}>
        <span style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:24,color:'var(--n900)',letterSpacing:'-.02em',lineHeight:1}}>{val}</span>
        {unit&&<span style={{fontSize:11.5,color:'var(--n400)',fontFamily:'var(--fm)'}}>{unit}</span>}
      </div>
      {delta&&<span style={{fontSize:10.5,fontWeight:600,color:up?'var(--green)':'var(--orange)'}}>{delta}</span>}

}

function Modal({open,onClose,title,subtitle,footer,children,width=500}){
  React.useEffect(()=>{if(!open)return;const fn=e=>{if(e.key==='Escape')onClose?.();};window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);},[open,onClose]);
  if(!open)return null;
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(19,16,23,.5)',backdropFilter:'blur(3px)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width,maxWidth:'100%',maxHeight:'90vh',background:'#fff',borderRadius:'var(--r2xl)',boxShadow:'var(--sh-xl)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,padding:'20px 22px 14px',borderBottom:'1px solid var(--n150)'}}>
          <div>
            <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:19,color:'var(--n900)',letterSpacing:'-.015em'}}>{title}</div>
            {subtitle&&<div style={{fontSize:13,color:'var(--n500)',marginTop:2}}>{subtitle}</div>}
          </div>
          <button onClick={onClose} style={{display:'flex',width:32,height:32,alignItems:'center',justifyContent:'center',border:'none',background:'transparent',borderRadius:'var(--rmd)',color:'var(--n400)'}}><Icon n="x" s={18} c="var(--n400)"/></button>

function ExportReminder({dataCount}){
  const [tick,setTick]=React.useState(0);
  React.useEffect(()=>{
    const fn=()=>setTick(t=>t+1);
    window.addEventListener('pb-exported',fn);
    return()=>window.removeEventListener('pb-exported',fn);
  },[]);
  if(dataCount===0) return null;
  const last=Number(localStorage.getItem('pb-last-export')||0);
  const days=last?Math.floor((Date.now()-last)/86400000):null;
  if(last&&days<7) return null; // exporté récemment : pas de rappel
  return(
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 16px',marginBottom:18,background:'var(--ambers)',border:'1px solid #f0d98a',borderRadius:'var(--rlg)'}}>

  );
}

/* ── SPARKLINE 7 JOURS ── */
function Sparkline({sessions,clientId}){
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    return d.toISOString().slice(0,10);
  });
  const counts=days.map(d=>sessions.filter(s=>{
    const parts=s.participants||[];
    const match=parts.some(p=>p.clientId===clientId)||s.clientId===clientId;
    return match&&s.date===d;
  }).length);
  const max=Math.max(...counts,1);
  const LABELS=['L','M','M','J','V','S','D'];
  const today=new Date().toISOString().slice(0,10);
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:3,height:28}}>
      {days.map((d,i)=>{
        const h=Math.max(3,(counts[i]/max)*22);
        const isT=d===today;
        return(
          <div key={i} title={`${d} : ${counts[i]} séance${counts[i]>1?'s':''}`} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,flex:1}}>
            <div style={{width:'100%',maxWidth:14,height:h,borderRadius:3,background:counts[i]>0?'var(--v)':'var(--n150)',opacity:isT?1:.7,transition:'height .3s'}}/>
            <span style={{fontSize:8,color:isT?'var(--v)':'var(--n400)',fontFamily:'var(--fm)',fontWeight:isT?700:400}}>{LABELS[i]}</span>
          </div>
        );
      })}
    </div>
  );
}

function SessionModal({open,onClose,prefill}){

  const empty={participants:[],date:TODAY,startH:9,durH:1,type:'force',title:'',notes:''};
  const [f,setF]=React.useState(empty);
  React.useEffect(()=>{
    if(prefill){
      const parts=prefill.participants||(prefill.clientId?[{clientId:prefill.clientId,tarifId:''}]:[]);
      setF({participants:parts,date:prefill.date||TODAY,startH:prefill.startH||9,durH:prefill.durH||1,type:prefill.type||'force',title:prefill.title||'',notes:prefill.notes||'',id:prefill.id});
    } else setF(empty);
  },[open]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const isEdit=!!f.id;
  const addParticipant=()=>setF(p=>({...p,participants:[...p.participants,{clientId:'',tarifId:''}]}));
  const setP=(i,k,v)=>setF(p=>{const parts=[...p.participants];parts[i]={...parts[i],[k]:v};return{...p,participants:parts};});
  const removeP=(i)=>setF(p=>({...p,participants:p.participants.filter((_,j)=>j!==i)}));
  const usedClients=f.participants.map(p=>p.clientId).filter(Boolean);
  const totalProjeté=f.participants.reduce((acc,p)=>{
    if(!p.tarifId)return acc;
    const t=state.tarifs.find(x=>x.id===p.tarifId);
    return acc+Number(t?.prix||0);
  },0);
  const fmt=n=>new Intl.NumberFormat('fr-FR').format(n)+'\u00a0€';

    if(!f.date)return;

                  </FSel>
                  {tarif&&<span style={{fontFamily:'var(--fm)',fontSize:13,fontWeight:700,color:'var(--v)',whiteSpace:'nowrap',flexShrink:0}}>{new Intl.NumberFormat('fr-FR').format(tarif.prix)} €</span>}
                  <button onClick={()=>removeP(i)} style={{border:'none',background:'transparent',padding:4,cursor:'pointer',color:'var(--n300)',flexShrink:0,borderRadius:'var(--rsm)'}}><Icon n="x" s={15} c="var(--n300)"/></button>
                </div>
              );
            })}
          </div>
        </div>
        <Field label="Notes / Exercices">
          <textarea value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="Exercices, consignes, intensité…" rows={3} style={{padding:'8px 12px',border:'1px solid var(--n200)',borderRadius:'var(--rmd)',fontSize:13.5,resize:'vertical',fontFamily:'var(--fb)',outline:'none',lineHeight:1.5,width:'100%'}}/>
        </Field>
      </div>
    </Modal>
  );
}

      </div>

}

/* ── CALENDRIER ── */
function CalendarScreen({onNewSession}){
  const {state,updateSession,deleteSession}=useStore();
  const [weekOffset,setWeekOffset]=React.useState(0);
  const [selected,setSelected]=React.useState(null);
  const [dragId,setDragId]=React.useState(null);
  const [completing,setCompleting]=React.useState(false);
  const [fb,setFb]=React.useState({rpe:7,fatigue:3,sommeil:3,douleur:1});
  React.useEffect(()=>{ if(selected){ setFb({rpe:selected.rpe||7,fatigue:selected.wellness?.fatigue||3,sommeil:selected.wellness?.sommeil||3,douleur:selected.wellness?.douleur||1}); setCompleting(false);} },[selected]);
  const getWeek=offset=>{
    const now=new Date();const day=now.getDay()||7;
    const mon=new Date(now);mon.setDate(now.getDate()-day+1+offset*7);
    return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  };
  const week=getWeek(weekOffset);
  const TODAY=new Date().toISOString().slice(0,10);
  const ROW=52,HS=7,HC=15;
  const weekLabel=`${week[0].getDate()} ${week[0].toLocaleDateString('fr-FR',{month:'short'})} – ${week[6].getDate()} ${week[6].toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}`;
  const onDrop=(e,date,h)=>{
    e.preventDefault();
    if(!dragId)return;
    updateSession(dragId,{date,startH:h});
    setDragId(null);
  };
  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 108px)',gap:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{display:'flex',gap:4}}>
            <Btn variant="secondary" size="sm" onClick={()=>setWeekOffset(w=>w-1)} icon="chevron-left"/>
            <Btn variant="secondary" size="sm" onClick={()=>setWeekOffset(w=>w+1)} icon="chevron-right"/>
          </div>
          <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:17,color:'var(--n900)',letterSpacing:'-.015em'}}>{weekLabel}</div>
          {weekOffset!==0&&<Btn variant="ghost" size="sm" onClick={()=>setWeekOffset(0)}>Aujourd'hui</Btn>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {Object.entries(TYPES).map(([k,t])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{width:8,height:8,borderRadius:2,background:t.color}}/><span style={{fontSize:11,color:'var(--n500)'}}>{t.label}</span>
            </div>
          ))}
          <Btn size="sm" onClick={()=>onNewSession()} icon="plus">Séance</Btn>
        </div>
      </div>
      <div style={{flex:1,background:'#fff',border:'1px solid var(--n200)',borderRadius:'var(--rxl)',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'var(--sh-sm)'}}>
        <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',borderBottom:'1px solid var(--n100)',flexShrink:0}}>
          <div/>
          {week.map((d,i)=>{
            const ds=d.toISOString().slice(0,10);const isT=ds===TODAY;
            return(
              <div key={i} style={{padding:'9px 0',textAlign:'center',borderLeft:'1px solid var(--n100)',background:isT?'var(--vs)':'#fff'}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',color:isT?'var(--v)':'var(--n400)'}}>{d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,3)}</div>
                <div style={{fontFamily:'var(--fm)',fontSize:17,fontWeight:700,color:isT?'var(--v)':'var(--n900)',marginTop:1}}>{d.getDate()}</div>
              </div>
            );
          })}
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',position:'relative'}}>
            <div>{Array.from({length:HC},(_,i)=>i+HS).map(h=>(
              <div key={h} style={{height:ROW,position:'relative'}}><span style={{position:'absolute',top:-8,right:6,fontFamily:'var(--fm)',fontSize:10,color:'var(--n300)'}}>{String(h).padStart(2,'0')}:00</span></div>
            ))}</div>
            {week.map((d,di)=>{
              const ds=d.toISOString().slice(0,10);const isT=ds===TODAY;
              const daySessions=state.sessions.filter(s=>s.date===ds);
              return(
                <div key={di} style={{position:'relative',borderLeft:'1px solid var(--n100)',background:isT?'rgba(84,58,134,.015)':'#fff'}}>
                  {Array.from({length:HC},(_,i)=>i+HS).map(h=>(
                    <div key={h} className="slot"
                      onClick={()=>onNewSession({date:ds,startH:h})}
                      onDragOver={e=>e.preventDefault()}
                      onDrop={e=>onDrop(e,ds,h)}
                      style={{height:ROW,borderBottom:'1px solid var(--n50)',transition:'var(--tr)'}}/>
                  ))}
                  {daySessions.map(s=>{
                    const t=TYPES[s.type]||TYPES.force;
                    const top=(s.startH-HS)*ROW+2;const height=(s.durH||1)*ROW-4;
                    const parts=(s.participants||[]).map(p=>state.clients.find(x=>x.id===p.clientId)).filter(Boolean);
                    const firstC=parts[0]||state.clients.find(x=>x.id===s.clientId);
                    return(
                      <div key={s.id}
                        draggable
                        onDragStart={e=>{e.dataTransfer.effectAllowed='move';setDragId(s.id);}}
                        onDragEnd={()=>setDragId(null)}
                        onClick={e=>{e.stopPropagation();setSelected(s);}} style={{position:'absolute',top,left:3,right:3,height,background:t.soft,borderLeft:`3px solid ${t.color}`,borderRadius:'var(--rmd)',padding:'4px 7px',cursor:'pointer',overflow:'hidden',boxShadow:'var(--sh-sm)',zIndex:1}}>
                        <div style={{fontFamily:'var(--fm)',fontSize:9.5,fontWeight:600,color:t.color}}>{String(s.startH).padStart(2,'0')}:00</div>
                        <div style={{fontSize:11,fontWeight:600,color:'var(--n900)',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.title||t.label}</div>
                        {height>46&&firstC&&<div style={{fontSize:10,color:'var(--n500)',marginTop:1}}>{parts.length>1?`${parts.length} athlètes`:firstC.name}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {selected&&(
        <Modal open={!!selected} onClose={()=>setSelected(null)} title={selected.title||TYPES[selected.type]?.label||'Séance'}
          subtitle={`${new Date(selected.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})} · ${String(selected.startH).padStart(2,'0')}:00`}
          footer={completing?<>
            <Btn variant="ghost" size="sm" onClick={()=>setCompleting(false)}>Annuler</Btn>
            <div style={{flex:1}}/>
            <Btn size="sm" icon="check" onClick={()=>{updateSession(selected.id,{status:'done',rpe:fb.rpe,charge:Math.round(fb.rpe*(selected.durH||1)*60),wellness:{fatigue:fb.fatigue,sommeil:fb.sommeil,douleur:fb.douleur}});setSelected(null);}}>Valider la séance</Btn>
          </>:<>
            <Btn variant="danger" size="sm" onClick={()=>{deleteSession(selected.id);setSelected(null);}} icon="trash-2">Supprimer</Btn>
            <div style={{flex:1}}/>
            <Btn variant="secondary" size="sm" onClick={()=>{onNewSession({...selected});setSelected(null);}} icon="pencil">Modifier</Btn>
            {selected.status!=='done'
              ?<Btn size="sm" onClick={()=>setCompleting(true)} icon="check">Marquer réalisée</Btn>
              :<Btn variant="secondary" size="sm" onClick={()=>setCompleting(true)} icon="pencil">Modifier le ressenti</Btn>
            }
          </>}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <Tag type={selected.type}/>
              <span style={{fontSize:12,color:'var(--n400)',display:'flex',alignItems:'center',gap:4}}><Icon n="clock" s={13} c="var(--n400)"/>{(selected.durH||1)<1?(selected.durH||1)*60+' min':(selected.durH||1)+'h'}</span>
            </div>
{(()=>{
              const parts=(selected.participants||[]).map(p=>({p,c:state.clients.find(x=>x.id===p.clientId)})).filter(x=>x.c);
              const solo=state.clients.find(x=>x.id===selected.clientId);
              const display=parts.length>0?parts:[solo?{p:{},c:solo}:null].filter(Boolean);
              if(!display.length)return null;
              return(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {display.map(({p,c},i)=>{
                    const tarif=p.tarifId?state.tarifs.find(t=>t.id===p.tarifId):null;
                    return(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'var(--n50)',borderRadius:'var(--rlg)'}}>
                        <Avatar name={c.name} size={34}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13.5,fontWeight:600,color:'var(--n900)'}}>{c.name}</div>
                          <div style={{fontSize:12,color:'var(--n500)'}}>{c.sport}</div>
                        </div>
                        {tarif&&<span style={{fontFamily:'var(--fm)',fontSize:13,fontWeight:700,color:'var(--v)',whiteSpace:'nowrap'}}>{new Intl.NumberFormat('fr-FR').format(tarif.prix)} €</span>}
                      </div>
                    );
                  })}
                </div>
              );
            })()}
            {selected.notes&&<div style={{fontSize:13.5,color:'var(--n700)',background:'var(--n50)',borderRadius:'var(--rlg)',padding:'10px 14px',lineHeight:1.55,whiteSpace:'pre-wrap'}}>{selected.notes}</div>}
            {completing&&(()=>{
              const SLIDERS=[
                {k:'rpe',label:'RPE — Intensité perçue',min:1,max:10,hint:['Très facile','Facile','Modéré','Soutenu','Dur','Très dur','Maximal'],color:'var(--v)'},
                {k:'fatigue',label:'Fatigue avant séance',min:1,max:5,hint:['Fraîs','OK','Moyen','Fatigué','Épuisé'],color:'var(--orange)'},
                {k:'sommeil',label:'Qualité sommeil',min:1,max:5,hint:['Mauvais','Moyen','Correct','Bon','Excellent'],color:'var(--teal)'},
                {k:'douleur',label:'Douleurs / courbatures',min:1,max:5,hint:['Aucune','Légère','Modérée','Forte','Sévère'],color:'var(--red)'},
              ];
              return(
                <div style={{display:'flex',flexDirection:'column',gap:14,padding:'14px 0 2px',borderTop:'1px dashed var(--n200)'}}>
                  <div style={{fontSize:12,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--v)'}}>Ressenti de la séance</div>
                  {SLIDERS.map(sl=>{
                    const val=fb[sl.k];const pct=((val-sl.min)/(sl.max-sl.min))*100;
                    const hintIdx=sl.max===10?Math.min(6,Math.floor((val-1)/1.5)):val-1;
                    return(
                      <div key={sl.k}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                          <span style={{fontSize:13,fontWeight:600,color:'var(--n900)'}}>{sl.label}</span>
                          <span style={{display:'flex',alignItems:'baseline',gap:6}}>
                            <span style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:15,color:sl.color}}>{val}</span>
                            <span style={{fontSize:11.5,color:'var(--n400)'}}>{sl.hint[hintIdx]}</span>
                          </span>
                        </div>
                        <input type="range" min={sl.min} max={sl.max} value={val} onChange={e=>setFb(p=>({...p,[sl.k]:Number(e.target.value)}))} style={{width:'100%',height:6,borderRadius:99,appearance:'none',cursor:'pointer',background:`linear-gradient(90deg, ${sl.color} ${pct}%, var(--n150) ${pct}%)`,accentColor:sl.color}}/>
                      </div>
                    );
                  })}
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'var(--vs)',borderRadius:'var(--rlg)'}}>
                    <Icon n="flame" s={16} c="var(--v)"/>
                    <span style={{fontSize:13,color:'var(--n700)'}}>Charge calculée : <strong style={{fontFamily:'var(--fm)',color:'var(--v)'}}>{Math.round(fb.rpe*(selected.durH||1)*60)} UA</strong> <span style={{color:'var(--n400)',fontSize:12}}>(RPE × {Math.round((selected.durH||1)*60)} min)</span></span>
                  </div>
                </div>
              );
            })()}
            {!completing&&selected.status==='done'&&selected.rpe&&(
              <div style={{display:'flex',gap:8,flexWrap:'wrap',padding:'10px 14px',background:'var(--greens)',borderRadius:'var(--rlg)'}}>
                <span style={{fontSize:12.5,color:'var(--n700)'}}>RPE <strong style={{fontFamily:'var(--fm)',color:'var(--green)'}}>{selected.rpe}</strong></span>
                <span style={{color:'var(--n300)'}}>·</span>
                <span style={{fontSize:12.5,color:'var(--n700)'}}>Charge <strong style={{fontFamily:'var(--fm)',color:'var(--green)'}}>{selected.charge||Math.round(selected.rpe*(selected.durH||1)*60)} UA</strong></span>
              </div>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── VUE MATRICIELLE GROUPE ── */
function MatrixView(){
  const {state,updateSession}=useStore();
  const [weeks,setWeeks]=React.useState(0);
  const getWeek=offset=>{
    const now=new Date();const day=now.getDay()||7;
    const mon=new Date(now);mon.setDate(now.getDate()-day+1+offset*7);
    return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  };
  const week=getWeek(weeks);
  const TODAY=new Date().toISOString().slice(0,10);

/* ── TESTS 30-15 IFT ── */
// VO2max estimé (Buchheit 2008) ; G:1 H / 2 F
function iftVO2max(vift,age,weight,sex){
  const G=sex==='F'?2:1;
  return 28.3-2.15*G-0.741*age-0.0357*weight+0.0586*age*vift+1.03*vift;
}
// Formats HIIT football : % VIFT → vitesse + distance par répétition
const IFT_FORMATS=[
  {label:'Intervalles longs',detail:'4 × 4 min',pct:90,sec:null,note:'Capacité aérobie'},
  {label:'30/30',detail:'30s effort · 30s récup',pct:95,sec:30,note:'Puissance aérobie'},
  {label:'15/15',detail:'15s effort · 15s récup',pct:100,sec:15,note:'PMA + changements de direction'},
  {label:'15/15 intensif',detail:'15s effort · 15s récup',pct:105,sec:15,note:'Tolérance lactique'},
];
function IFTTestsCard({cId,client}){
  const {state,addTest,deleteTest}=useStore();
  const tests=(state.tests||[]).filter(t=>t.clientId===cId).sort((a,b)=>b.date.localeCompare(a.date));
  const [open,setOpen]=React.useState(false);
  const [form,setForm]=React.useState({date:new Date().toISOString().slice(0,10),vift:'',weight:'',age:'',sex:'H'});
  React.useEffect(()=>{ setOpen(false); setForm(f=>({...f,vift:'',weight:tests[0]?.weight||'',age:tests[0]?.age||'',sex:tests[0]?.sex||'H'})); },[cId]);
  const latest=tests[0];
  const prev=tests[1];
  const submit=()=>{
    const vift=parseFloat(form.vift);if(!vift||vift<10||vift>30)return;
    addTest({clientId:cId,date:form.date,vift,weight:parseFloat(form.weight)||70,age:parseFloat(form.age)||25,sex:form.sex});
    setForm(f=>({...f,vift:''}));setOpen(false);
  };
  const card={background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'18px 20px',boxShadow:'var(--sh-sm)'};
  return(
    <div style={card}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4,flexWrap:'wrap',gap:10}}>

          <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:15,color:'var(--n900)'}}>Test 30-15 IFT</div>

        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end',padding:'14px 0 16px',marginTop:8,borderTop:'1px dashed var(--n200)'}}>
          {[['date','Date','date'],['vift','VIFT (km/h)','number'],['weight','Poids (kg)','number'],['age','Âge','number']].map(([k,l,t])=>(
            <div key={k} style={{display:'flex',flexDirection:'column',gap:4}}>
              <label style={{fontSize:11,fontWeight:600,color:'var(--n500)'}}>{l}</label>
              <input type={t} step={k==='vift'?'0.5':'1'} value={form[k]} placeholder={k==='vift'?'ex. 19.5':''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{width:k==='date'?140:90,height:36,border:'1px solid var(--n200)',borderRadius:'var(--rmd)',padding:'0 10px',fontSize:13.5,fontFamily:k==='date'?'var(--fb)':'var(--fm)',color:'var(--n900)'}}/>
            </div>
          ))}
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <label style={{fontSize:11,fontWeight:600,color:'var(--n500)'}}>Sexe</label>
            <div style={{display:'flex',gap:3,background:'var(--n100)',borderRadius:'var(--rmd)',padding:3,height:36}}>
              {['H','F'].map(s=><button key={s} onClick={()=>setForm(f=>({...f,sex:s}))} style={{padding:'0 12px',border:'none',borderRadius:'var(--rsm)',fontSize:13,fontWeight:600,cursor:'pointer',background:form.sex===s?'#fff':'transparent',color:form.sex===s?'var(--v)':'var(--n500)'}}>{s}</button>)}

                      const h=20+((t.vift-minV)/range)*78;
                      return(
                        <div key={t.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5,minWidth:0}}>
                          <span style={{fontFamily:'var(--fm)',fontSize:11,fontWeight:700,color:'var(--v)'}}>{t.vift}</span>
                          <div style={{width:'100%',maxWidth:40,height:h,borderRadius:'6px 6px 0 0',background:i===chron.length-1?'var(--v)':'var(--violet100,#e4ddf2)'}}/>
                          <span style={{fontSize:9.5,color:'var(--n400)',fontFamily:'var(--fm)',whiteSpace:'nowrap'}}>{new Date(t.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {/* Historique */}
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {tests.map(t=>(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',background:'var(--n50)',borderRadius:'var(--rmd)'}}>
                    <span style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--n500)',width:90}}>{new Date(t.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'2-digit'})}</span>
                    <span style={{fontFamily:'var(--fm)',fontSize:13,fontWeight:700,color:'var(--n900)'}}>{t.vift} km/h</span>
                    <span style={{fontSize:12,color:'var(--n400)'}}>VO₂ {iftVO2max(t.vift,t.age,t.weight,t.sex).toFixed(1)}</span>
                    <span style={{fontSize:12,color:'var(--n400)'}}>{t.weight}kg · {t.age}ans</span>
                    <button onClick={()=>deleteTest(t.id)} title="Supprimer" style={{marginLeft:'auto',border:'none',background:'transparent',cursor:'pointer',padding:4,color:'var(--n400)',display:'flex'}}><Icon n="trash-2" s={14}/></button>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
    </div>
  );
}

function PerformanceScreen(){
  const {state}=useStore();
  const [cId,setCId]=React.useState('');
  const [view,setView]=React.useState('indiv');
  const [reportOpen,setReportOpen]=React.useState(false);
  const client=state.clients.find(c=>c.id===cId);
  const sessions=client?state.sessions.filter(s=>{
    if(s.participants&&s.participants.length>0) return s.participants.some(p=>p.clientId===cId);
    return s.clientId===cId;
  }):[];
  const done=sessions.filter(s=>s.status==='done');
  const byType=Object.entries(TYPES).map(([k,t])=>({...t,key:k,count:sessions.filter(s=>s.type===k).length})).filter(t=>t.count>0);
  const printReport=()=>{
    const win=window.open('','_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Rapport ${client?.name||''}</title><link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/><style>body{margin:0;padding:0;background:#fff;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style></head><body>`);
    const el=document.getElementById('report-print');
    if(el)win.document.write(el.outerHTML);
    win.document.write('</body></html>');
    win.document.close();
    setTimeout(()=>{win.print();},400);
  };
  if(state.clients.length===0) return <Empty icon="activity" title="Aucun athlète suivi" sub="Ajoutez des athlètes et planifiez des séances pour suivre leur progression."/>;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20,maxWidth:1280}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',gap:4,background:'var(--n100)',borderRadius:'var(--rlg)',padding:3}}>
          {[['indiv','Individuel'],['matrix','Vue groupe']].map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)} style={{padding:'6px 14px',border:'none',borderRadius:'var(--rmd)',fontSize:13,fontWeight:view===k?600:500,cursor:'pointer',background:view===k?'#fff':'transparent',color:view===k?'var(--n900)':'var(--n500)',boxShadow:view===k?'var(--sh-sm)':'none',transition:'var(--tr)'}}>{l}</button>
          ))}
        </div>
      </div>
      {view==='matrix'
        ?<MatrixView/>
        :(<>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {state.clients.map(c=>(
              <button key={c.id} onClick={()=>setCId(c.id)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 14px',border:`1.5px solid ${cId===c.id?'var(--v)':'var(--n200)'}`,borderRadius:'var(--rpill)',cursor:'pointer',background:cId===c.id?'var(--vs)':'#fff',transition:'var(--tr)'}}>
                <Avatar name={c.name} size={28}/><span style={{fontSize:13.5,fontWeight:600,color:cId===c.id?'var(--v)':'var(--n900)'}}>{c.name}</span>
              </button>
            ))}
          </div>
          {!client
            ?<Empty icon="bar-chart-2" title="Sélectionnez un athlète" sub="Choisissez un athlète ci-dessus pour voir ses statistiques."/>
            :<>
                {sessions.length===0
                  ?<div style={{background:'var(--n50)',border:'1px dashed var(--n200)',borderRadius:'var(--rxl)',padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
                    <Icon n="calendar-x" s={18} c="var(--n400)"/>
                    <div style={{fontSize:13,color:'var(--n500)',lineHeight:1.5}}>Aucune séance pour cet athlète pour l'instant. Créez des séances pour suivre charge & complétion — vous pouvez déjà enregistrer un test physique ci-dessous.</div>
                  </div>
                  :<>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
                  <Kpi label="Total séances" val={sessions.length} icon="calendar" accent="var(--v)"/>
                  <Kpi label="Réalisées" val={done.length} icon="check-circle" accent="var(--teal)"/>
                  <Kpi label="Taux de complétion" val={Math.round((done.length/sessions.length)*100)} unit="%" icon="trending-up" accent="var(--blue)"/>
                  <Kpi label="Manquées" val={sessions.filter(s=>s.status==='missed').length} icon="x-circle" accent="var(--red)"/>
                </div>
                {(()=>{
                  // ── Charge & ACWR (ratio charge aiguë / chronique) ──
                  const doneS=sessions.filter(s=>s.status==='done'&&s.charge);
                  if(doneS.length<1) return (
                    <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'18px 20px',boxShadow:'var(--sh-sm)'}}>
                      <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:15,color:'var(--n900)',marginBottom:6}}>Charge d'entraînement & risque</div>
                      <div style={{fontSize:13,color:'var(--n500)',lineHeight:1.55}}>Renseignez le <strong>RPE</strong> en marquant les séances « réalisées » (onglet Calendrier) pour suivre la charge réelle et le ratio de risque de blessure (ACWR).</div>
                    </div>
                  );
                  const today=new Date();
                  const dayDiff=d=>Math.floor((today-new Date(d+'T12:00'))/86400000);
                  const acute=doneS.filter(s=>dayDiff(s.date)>=0&&dayDiff(s.date)<7).reduce((a,s)=>a+s.charge,0);
                  const last28=doneS.filter(s=>dayDiff(s.date)>=0&&dayDiff(s.date)<28);
                  const chronic=last28.length?last28.reduce((a,s)=>a+s.charge,0)/4:0;
                  const acwr=chronic>0?(acute/chronic):0;
                  const zone=acwr===0?{l:'\u2014',c:'var(--n400)',bg:'var(--n50)',txt:'Pas assez de données'}:acwr<0.8?{l:'Sous-charge',c:'var(--blue)',bg:'var(--blues)',txt:'Charge faible — marge de progression'}:acwr<=1.3?{l:'Optimal',c:'var(--green)',bg:'var(--greens)',txt:'Zone idéale — risque minimal'}:acwr<=1.5?{l:'Vigilance',c:'var(--amber)',bg:'var(--ambers)',txt:'Charge élevée — surveiller la fatigue'}:{l:'Risque élevé',c:'var(--red)',bg:'var(--reds)',txt:'Pic de charge — risque de blessure accru'};
                  // 14 derniers jours pour le graphe
                  const days=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().slice(0,10);});
                  const dayCharge=days.map(d=>doneS.filter(s=>s.date===d).reduce((a,s)=>a+s.charge,0));
                  const maxC=Math.max(...dayCharge,1);
                  const weekCharge=doneS.filter(s=>dayDiff(s.date)>=0&&dayDiff(s.date)<7).reduce((a,s)=>a+s.charge,0);
                  return(
                    <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'18px 20px',boxShadow:'var(--sh-sm)'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
                        <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:15,color:'var(--n900)'}}>Charge d'entraînement & risque</div>
                        <span style={{fontSize:11.5,color:'var(--n400)'}}>14 derniers jours · unités arbitraires (UA)</span>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:20,alignItems:'center'}}>
                        <div style={{display:'flex',flexDirection:'column',gap:10}}>
                          <div style={{padding:'14px 16px',background:zone.bg,borderRadius:'var(--rlg)'}}>
                            <div style={{fontSize:10.5,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:zone.c,marginBottom:6}}>Ratio ACWR</div>
                            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                              <span style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:30,color:zone.c,lineHeight:1}}>{acwr?acwr.toFixed(2):'—'}</span>
                              <span style={{fontSize:13,fontWeight:700,color:zone.c}}>{zone.l}</span>
                            </div>
                            <div style={{fontSize:11.5,color:'var(--n600)',marginTop:6,lineHeight:1.4}}>{zone.txt}</div>
                          </div>
                          <div style={{display:'flex',gap:8}}>
                            <div style={{flex:1,padding:'9px 12px',background:'var(--n50)',borderRadius:'var(--rmd)'}}>
                              <div style={{fontSize:10,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--n400)'}}>7 jours</div>
                              <div style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:15,color:'var(--n900)'}}>{weekCharge}</div>
                            </div>
                            <div style={{flex:1,padding:'9px 12px',background:'var(--n50)',borderRadius:'var(--rmd)'}}>
                              <div style={{fontSize:10,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--n400)'}}>Moy. 4 sem</div>
                              <div style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:15,color:'var(--n900)'}}>{Math.round(chronic)}</div>
                            </div>
                          </div>
                        </div>
                        <div style={{display:'flex',alignItems:'flex-end',gap:4,height:120,paddingLeft:6}}>
                          {dayCharge.map((c,i)=>{
                            const h=Math.max(2,(c/maxC)*104);
                            const dd=new Date(days[i]+'T12:00');
                            const isToday=dayDiff(days[i])===0;
                            return(
                              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                                <div title={`${c} UA`} style={{width:'100%',maxWidth:22,height:h,borderRadius:4,background:c>0?'var(--v)':'var(--n100)',opacity:i>=7?1:.45}}/>
                                <span style={{fontSize:8.5,color:isToday?'var(--v)':'var(--n400)',fontFamily:'var(--fm)',fontWeight:isToday?700:400}}>{dd.getDate()}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--n100)',fontSize:11,color:'var(--n400)',lineHeight:1.5}}>
                        <strong style={{color:'var(--n500)'}}>ACWR</strong> = charge des 7 derniers jours ÷ moyenne hebdo des 4 dernières semaines. Zone optimale 0,8–1,3 (Gabbett 2016). Au-delà de 1,5 : risque de blessure significativement accru.
                      </div>
                    </div>
                  );
                })()}
                  </>}
                <IFTTestsCard cId={cId} client={client}/>
                {byType.length>0&&(
                  <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'18px 20px',boxShadow:'var(--sh-sm)'}}>
                    <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:15,color:'var(--n900)',marginBottom:14}}>Répartition par type</div>
                    <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                      {byType.map(t=>(
                        <div key={t.key} style={{flex:1,minWidth:100,display:'flex',flexDirection:'column',gap:6,padding:'12px 14px',background:t.soft,borderRadius:'var(--rlg)',borderLeft:`3px solid ${t.color}`}}>
                          <span style={{fontSize:12,fontWeight:700,color:t.color}}>{t.label}</span>
                          <span style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:22,color:'var(--n900)',lineHeight:1}}>{t.count}</span>
                          <span style={{fontSize:11,color:'var(--n500)'}}>{Math.round((t.count/sessions.length)*100)}% du total</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',boxShadow:'var(--sh-sm)',overflow:'hidden'}}>
                  <div style={{padding:'14px 20px',borderBottom:'1px solid var(--n100)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:15,color:'var(--n900)'}}>Historique</div>
                    <Btn size="sm" variant="secondary" icon="file-text" onClick={()=>setReportOpen(true)}>Rapport PDF</Btn>
                  </div>
                  {[...sessions].sort((a,b)=>b.date.localeCompare(a.date)).map((s,i)=>{
                    const t=TYPES[s.type]||TYPES.force;
                    const SS={'done':{bg:'var(--greens)',fg:'var(--green)',l:'Réalisée'},'missed':{bg:'var(--reds)',fg:'var(--red)',l:'Manquée'},'upcoming':{bg:'var(--n50)',fg:'var(--n500)',l:'À venir'}};
                    const st=SS[s.status]||SS.upcoming;
                    return(
                      <div key={s.id} style={{display:'flex',alignItems:'center',gap:14,padding:'11px 20px',borderBottom:i<sessions.length-1?'1px solid var(--n50)':'none'}}>
                        <div style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--n500)',width:80,flexShrink:0}}>{new Date(s.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
                        <div style={{flex:1}}><div style={{fontSize:13.5,fontWeight:600,color:'var(--n900)'}}>{s.title||t.label}</div><div style={{fontSize:11.5,color:'var(--n400)',marginTop:1}}>{(s.durH||1)<1?(s.durH||1)*60+' min':(s.durH||1)+'h'}</div></div>
                        <Tag type={s.type}/>
                        <span style={{fontSize:11.5,fontWeight:600,color:st.fg,background:st.bg,padding:'2px 9px',borderRadius:'var(--rpill)'}}>{st.l}</span>
                      </div>
                    );
                  })}
                </div>
              </>
          }
          {reportOpen&&client&&(
            <Modal open={reportOpen} onClose={()=>setReportOpen(false)} title={`Rapport — ${client.name}`} width={860}
              footer={<><Btn variant="ghost" onClick={()=>setReportOpen(false)}>Fermer</Btn><Btn icon="printer" onClick={printReport}>Imprimer / PDF</Btn></>}>
              <AthleteReport client={client} sessions={sessions} tarifs={state.tarifs}/>
            </Modal>
          )}
        </>)
      }
    </div>
  );
}

                </tr></thead>
                <tbody>
                  {[...state.paiements].sort((a,b)=>b.date.localeCompare(a.date)).map((p,i)=>{
                    const c=state.clients.find(x=>x.id===p.clientId);
                    const ss=SS[p.statut]||SS['en attente'];
                    return(
                      <tr key={p.id} style={{borderBottom:i<state.paiements.length-1?'1px solid var(--n50)':'none'}}>
                        <td style={{padding:'10px 14px'}}>{c?<div style={{display:'flex',alignItems:'center',gap:8}}><Avatar name={c.name} size={28}/><span style={{fontWeight:600,color:'var(--n900)'}}>{c.name}</span></div>:<span style={{color:'var(--n400)'}}>—</span>}</td>
                        <td style={{padding:'10px 14px',color:'var(--n500)',fontSize:12}}>{p.tarifLabel||'—'}</td>
                        <td style={{padding:'10px 14px',textAlign:'center',fontFamily:'var(--fm)',fontWeight:700,color:'var(--n900)'}}>{fmt(p.montant)}</td>
                        <td style={{padding:'10px 14px',textAlign:'center',fontFamily:'var(--fm)',fontSize:12,color:'var(--n500)'}}>{p.date}</td>
                        <td style={{padding:'10px 14px',textAlign:'center'}}><span style={{background:'var(--n50)',borderRadius:4,padding:'2px 8px',fontSize:11.5,fontWeight:600,color:'var(--n500)'}}>{p.mode}</span></td>
                        <td style={{padding:'10px 14px'}}><span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:99,background:ss.bg,fontSize:11.5,fontWeight:700,color:ss.fg}}><span style={{width:5,height:5,borderRadius:'50%',background:ss.fg}}/>{p.statut}</span></td>
                        <td style={{padding:'10px 14px'}}>{p.statut!=='payé'&&<button onClick={()=>updatePaiement(p.id,{statut:'payé'})} style={{border:'none',background:'transparent',cursor:'pointer',color:'var(--green)',fontFamily:'var(--fb)',fontSize:11.5,fontWeight:600,display:'flex',alignItems:'center',gap:3}}><Icon n="check" s={13} c="var(--green)"/>Payé</button>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          }
          <Modal open={npOpen} onClose={()=>setNpOpen(false)} title="Enregistrer un paiement" width={440}
            footer={<><Btn variant="ghost" onClick={()=>setNpOpen(false)}>Annuler</Btn><Btn onClick={()=>{addPaiement(np);setNpOpen(false);}}>Enregistrer</Btn></>}>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <Field label="Athlète">
                <FSel value={np.clientId} onChange={e=>setNp(n=>({...n,clientId:e.target.value}))}>
                  <option value="">— Sélectionner —</option>
                  {state.clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </FSel>
              </Field>
              <Field label="Prestation">
                <FSel value={np.tarifId} onChange={e=>{const t=state.tarifs.find(x=>x.id===e.target.value);setNp(n=>({...n,tarifId:e.target.value,tarifLabel:t?.label||'',montant:t?.prix||n.montant}));}}>
                  <option value="">— Choisir —</option>
                  {state.tarifs.filter(t=>t.active).map(t=><option key={t.id} value={t.id}>{t.label} — {fmt(t.prix)}</option>)}
                </FSel>
              </Field>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <Field label="Montant (€)"><FInput type="number" value={np.montant} onChange={e=>setNp(n=>({...n,montant:e.target.value}))} placeholder="75"/></Field>
                <Field label="Mode">
                  <FSel value={np.mode} onChange={e=>setNp(n=>({...n,mode:e.target.value}))}>
                    {['Virement','CB','Stripe','SumUp','Espèces','Chèque'].map(m=><option key={m} value={m}>{m}</option>)}
                  </FSel>
                </Field>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <Field label="Date"><FInput type="date" value={np.date} onChange={e=>setNp(n=>({...n,date:e.target.value}))}/></Field>
                <Field label="Statut">
                  <FSel value={np.statut} onChange={e=>setNp(n=>({...n,statut:e.target.value}))}>
                    {['payé','en attente','en retard'].map(s=><option key={s} value={s}>{s}</option>)}
                  </FSel>
                </Field>
              </div>
            </div>
          </Modal>
        </div>
      )}
      {tab==='outils'&&(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {OUTILS.map((o,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',boxShadow:'var(--sh-sm)'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                  <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:16,color:'var(--n900)'}}>{o.nom}</span>
                  <span style={{fontSize:11,fontWeight:600,color:'var(--v)',background:'var(--vs)',borderRadius:'var(--rpill)',padding:'1px 9px'}}>{o.cat}</span>
                </div>
                <div style={{fontSize:13.5,color:'var(--n700)',marginBottom:2}}>{o.desc}</div>
                <div style={{fontSize:12,color:'var(--n400)',fontFamily:'var(--fm)'}}>{o.tarif}</div>
              </div>
              <a href={o.url} target="_blank" rel="noreferrer" style={{textDecoration:'none'}}><Btn variant="secondary" size="sm" iconR="arrow-up-right">Voir</Btn></a>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
