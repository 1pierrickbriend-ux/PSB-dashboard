/* ── ÉCRAN PROGRAMMES ── */
function ProgramsScreen(){
  const {state,addSession}=useStore();
  const [selected,setSelected]=React.useState(null);
  const [step,setStep]=React.useState(1); // 1=liste, 2=detail, 3=preview
  const [cfg,setCfg]=React.useState({clientIds:[],startDate:new Date().toISOString().slice(0,10)});
  const [assigned,setAssigned]=React.useState(false);
  const [editOpen,setEditOpen]=React.useState(false);
  const [editForfait,setEditForfait]=React.useState(null);
  const [customForfaits,setCustomForfaits]=React.useState(()=>{
    try{return JSON.parse(localStorage.getItem('pb-custom-forfaits')||'[]');}catch{return[];}
  });

  const saveCustom=(list)=>{
    setCustomForfaits(list);
    localStorage.setItem('pb-custom-forfaits',JSON.stringify(list));
  };

  const allForfaits=[...FORFAITS,...customForfaits];
  const forfait=allForfaits.find(f=>f.id===selected)||null;

  const preview=React.useMemo(()=>{
    if(!forfait||!cfg.startDate) return [];
    const start=new Date(cfg.startDate+'T12:00');
    const sessions=[];
    for(let w=0;w<forfait.semaines;w++){
      (forfait.microcycle||[]).forEach(m=>{
        const d=new Date(start);
        d.setDate(start.getDate()+w*7+(m.jour-1));
        sessions.push({
          date:d.toISOString().slice(0,10),startH:9,durH:m.duree||1,
          type:m.type||'force',title:m.titre||'',notes:m.contenu||'',
          participants:cfg.clientIds.map(cId=>({clientId:cId,tarifId:''})),
          _week:w+1,_rpe:m.rpe||7,
        });
      });
    }
    return sessions;
  },[forfait,cfg]);

  const assign=()=>{preview.forEach(s=>addSession(s));setAssigned(true);};
  const reset=()=>{setSelected(null);setStep(1);setCfg({clientIds:[],startDate:new Date().toISOString().slice(0,10)});setAssigned(false);};
  const openEdit=(f)=>{setEditForfait(f?JSON.parse(JSON.stringify(f)):{id:'c-'+Date.now(),nom:'',semaines:4,joursParSem:3,niveau:'Personnalisé',prix:0,description:'',science:'',couleur:'#7733dd',objectifs:[''],tests:[{sem:0,nom:'Test initial',desc:''}],microcycle:[{jour:1,type:'force',titre:'',duree:1,rpe:7,contenu:''}],progressionNotes:''});setEditOpen(true);};
  const saveEdit=()=>{
    const list=customForfaits.filter(f=>f.id!==editForfait.id);
    saveCustom([...list,editForfait]);
    setEditOpen(false);
  };
  const deleteCustom=(id)=>{if(confirm('Supprimer ce programme ?'))saveCustom(customForfaits.filter(f=>f.id!==id));};

  const Tag2=({label,color})=><span style={{fontSize:11,fontWeight:600,padding:'2px 9px',borderRadius:'var(--rpill)',background:color+'18',color}}>{label}</span>;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20,maxWidth:1280}}>
      {/* ── STEP 1 : liste ── */}
      {step===1&&(
        <>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,flexWrap:'wrap'}}>
            <div>
              <div style={{fontFamily:'var(--fbebas)',fontWeight:800,fontSize:22,color:'var(--n900)',letterSpacing:'-.02em',marginBottom:6}}>Programmes d'entraînement</div>
              <div style={{fontSize:14,color:'var(--n500)',lineHeight:1.55}}>Basés sur : Périodisation Tactique (Vítor Frade), Verheijen, Buchheit & Laursen, Nordic Hamstring (Petersen 2011), FIFA 11+.</div>
            </div>
            <Btn icon="plus" onClick={()=>openEdit(null)}>Créer un programme</Btn>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
            {allForfaits.map(f=>(
              <div key={f.id} style={{background:'#fff',border:`2px solid var(--n150)`,borderRadius:'var(--rxl)',padding:20,boxShadow:'var(--sh-sm)',display:'flex',flexDirection:'column',gap:10}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                  <span style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:15,color:f.couleur||'var(--v)',lineHeight:1.2}}>{f.nom}</span>
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    {customForfaits.find(c=>c.id===f.id)&&(
                      <>
                        <button onClick={e=>{e.stopPropagation();openEdit(f);}} style={{border:'none',background:'transparent',cursor:'pointer',padding:3}}><Icon n="pencil" s={14} c="var(--n400)"/></button>
                        <button onClick={e=>{e.stopPropagation();deleteCustom(f.id);}} style={{border:'none',background:'transparent',cursor:'pointer',padding:3}}><Icon n="trash-2" s={14} c="var(--n300)"/></button>
                      </>
                    )}
                  </div>
                </div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  <Tag2 label={f.niveau} color={f.couleur||'var(--v)'}/>
                  <span style={{fontSize:11,fontWeight:600,padding:'2px 9px',borderRadius:'var(--rpill)',background:'var(--n50)',color:'var(--n500)',border:'1px solid var(--n150)'}}>{f.semaines} sem · {f.joursParSem}j/sem</span>
                  {f.prix>0&&<span style={{fontFamily:'var(--fm)',fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:'var(--rpill)',background:'var(--n50)',color:'var(--n900)',border:'1px solid var(--n150)'}}>{f.prix} €</span>}
                </div>
                <div style={{fontSize:12.5,color:'var(--n500)',lineHeight:1.55,flex:1}}>{f.description}</div>
                <div style={{fontSize:11,color:'var(--n400)',fontStyle:'italic',borderTop:'1px solid var(--n100)',paddingTop:8,lineHeight:1.45}}>{(f.science||'').split('.')[0]}.</div>
                <Btn onClick={()=>{setSelected(f.id);setStep(2);setAssigned(false);}} iconR="arrow-right" style={{marginTop:2}}>Voir le programme</Btn>
              </div>
            ))}
          </div>
        </>
      )}

      {/* ── STEP 2 : détail ── */}
      {step===2&&forfait&&(
        <div style={{display:'flex',flexDirection:'column',gap:16,maxWidth:900}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button onClick={()=>setStep(1)} style={{border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--n500)',fontFamily:'var(--fb)'}}><Icon n="arrow-left" s={16} c="var(--n400)"/>Retour</button>
              <div style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:19,color:forfait.couleur||'var(--v)'}}>{forfait.nom}</div>
            </div>
            {customForfaits.find(c=>c.id===forfait.id)&&<Btn size="sm" variant="secondary" icon="pencil" onClick={()=>openEdit(forfait)}>Modifier</Btn>}
          </div>

          {forfait.science&&(
            <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'16px 18px',boxShadow:'var(--sh-sm)'}}>
              <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:14,color:'var(--n900)',marginBottom:10}}>Base scientifique & objectifs</div>
              <div style={{fontSize:13,color:'var(--n700)',lineHeight:1.6,padding:'10px 14px',background:'var(--n50)',borderRadius:'var(--rlg)',borderLeft:`3px solid ${forfait.couleur||'var(--v)'}`,marginBottom:12}}>{forfait.science}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {(forfait.objectifs||[]).filter(o=>o).map((o,i)=>(
                  <div key={i} style={{display:'flex',gap:8,fontSize:13,color:'var(--n700)',alignItems:'flex-start'}}>
                    <span style={{width:18,height:18,borderRadius:'50%',background:(forfait.couleur||'var(--v)')+'18',color:forfait.couleur||'var(--v)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</span>{o}
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'16px 18px',boxShadow:'var(--sh-sm)'}}>
            <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:14,color:'var(--n900)',marginBottom:12}}>Microcycle type (1 semaine)</div>
            {(forfait.microcycle||[]).map((m,i)=>{
              const t=TYPES[m.type]||TYPES.force;
              return(
                <div key={i} style={{display:'flex',gap:12,padding:'10px 14px',marginBottom:6,background:'var(--n50)',borderRadius:'var(--rlg)',borderLeft:`3px solid ${t.color}`}}>
                  <div style={{flexShrink:0,width:34,textAlign:'center'}}>
                    <div style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:13,color:'var(--n900)'}}>J{m.jour}</div>
                    <div style={{fontSize:10,color:'var(--n400)'}}>{(m.duree||1)<1?(m.duree||1)*60+'min':(m.duree||1)+'h'}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,fontSize:13.5,color:'var(--n900)'}}>{m.titre}</span>
                      <span style={{fontSize:10.5,fontWeight:600,padding:'2px 7px',borderRadius:'var(--rpill)',background:t.soft,color:t.color}}>{t.label}</span>
                      <span style={{fontSize:11,fontWeight:600,padding:'1px 7px',borderRadius:4,background:'var(--n100)',color:'var(--n500)',fontFamily:'var(--fm)'}}>RPE {m.rpe}</span>
                    </div>
                    <div style={{fontSize:12.5,color:'var(--n600,var(--n500))',lineHeight:1.55}}>{m.contenu}</div>
                  </div>
                </div>
              );
            })}
            {forfait.progressionNotes&&<div style={{marginTop:6,fontSize:12.5,color:'var(--n700)',padding:'10px 14px',background:'var(--ambers)',borderRadius:'var(--rlg)',borderLeft:'3px solid var(--amber)'}}><strong>Progression :</strong> {forfait.progressionNotes}</div>}
          </div>

          {(forfait.tests||[]).length>0&&(
            <div style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',padding:'16px 18px',boxShadow:'var(--sh-sm)'}}>
              <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:14,color:'var(--n900)',marginBottom:12}}>Tests & évaluations</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {forfait.tests.map((t,i)=>(
                  <div key={i} style={{padding:'10px 14px',background:'var(--n50)',borderRadius:'var(--rlg)',border:'1px solid var(--n150)'}}>
                    <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:3}}>
                      <span style={{fontFamily:'var(--fm)',fontSize:10.5,fontWeight:700,color:'var(--v)',background:'var(--vs)',padding:'1px 6px',borderRadius:4}}>S{t.sem}</span>
                      <span style={{fontSize:13,fontWeight:700,color:'var(--n900)'}}>{t.nom}</span>
                    </div>
                    <div style={{fontSize:12,color:'var(--n500)'}}>{t.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{background:'#fff',border:`2px solid ${forfait.couleur||'var(--v)'}`,borderRadius:'var(--rxl)',padding:'18px 20px'}}>
            <div style={{fontFamily:'var(--fbebas)',letterSpacing:'.01em',fontWeight:700,fontSize:15,color:'var(--n900)',marginBottom:14}}>Assigner ce programme à des athlètes</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:14}}>
              <div>
                <label style={{fontSize:13,fontWeight:600,color:'var(--n900)',display:'block',marginBottom:8}}>Athlètes</label>
                {state.clients.length===0
                  ?<div style={{fontSize:13,color:'var(--n400)',padding:'12px',background:'var(--n50)',borderRadius:'var(--rmd)',textAlign:'center'}}>Ajoutez d'abord des athlètes dans l'onglet Athlètes.</div>
                  :state.clients.map(c=>{
                    const on=cfg.clientIds.includes(c.id);
                    return(
                      <label key={c.id} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'8px 12px',borderRadius:'var(--rmd)',marginBottom:6,background:on?'var(--vs)':'var(--n50)',border:`1px solid ${on?forfait.couleur||'var(--v)':'var(--n150)'}`,transition:'var(--tr)'}}>
                        <input type="checkbox" checked={on} onChange={()=>setCfg(p=>({...p,clientIds:on?p.clientIds.filter(id=>id!==c.id):[...p.clientIds,c.id]}))} style={{accentColor:forfait.couleur||'var(--v)'}}/>
                        <Avatar name={c.name} size={28}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13.5,fontWeight:600,color:on?forfait.couleur||'var(--v)':'var(--n900)'}}>{c.name}</div>
                          <div style={{fontSize:11,color:'var(--n400)'}}>{c.sport||c.level}</div>
                        </div>
                      </label>
                    );
                  })
                }
              </div>
              <div>
                <label style={{fontSize:13,fontWeight:600,color:'var(--n900)',display:'block',marginBottom:8}}>Date de début</label>
                <input type="date" value={cfg.startDate} onChange={e=>setCfg(p=>({...p,startDate:e.target.value}))} style={{height:38,padding:'0 12px',border:'1px solid var(--n200)',borderRadius:'var(--rmd)',fontSize:14,width:'100%',fontFamily:'var(--fb)',outline:'none'}}/>
                {cfg.startDate&&<div style={{fontSize:12,color:'var(--n500)',marginTop:6}}>Fin : {(()=>{const d=new Date(cfg.startDate+'T12:00');d.setDate(d.getDate()+forfait.semaines*7);return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});})()}</div>}
                <div style={{marginTop:12,padding:'10px 12px',background:'var(--n50)',borderRadius:'var(--rmd)',fontSize:13,color:'var(--n700)'}}>
                  <strong>{forfait.semaines * (forfait.microcycle||[]).length}</strong> séances seront créées dans votre calendrier.
                  {cfg.clientIds.length>0&&<span style={{color:'var(--n400)'}}> Pour {cfg.clientIds.length} athlète{cfg.clientIds.length>1?'s':''}.</span>}
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <Btn variant="secondary" onClick={()=>setStep(1)}>Retour</Btn>
              <Btn onClick={()=>setStep(3)} iconR="arrow-right" style={{background:forfait.couleur||'var(--v)',border:'none',boxShadow:`0 2px 8px ${forfait.couleur||'#7733dd'}44`}}>Aperçu du planning</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ── STEP 3 : planning semaine par semaine ── */}
      {step===3&&forfait&&(
        <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:1100}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button onClick={()=>setStep(2)} style={{border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--n500)',fontFamily:'var(--fb)'}}><Icon n="arrow-left" s={16} c="var(--n400)"/>Retour</button>
              <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:17,color:'var(--n900)'}}>{forfait.nom} — {forfait.semaines} semaines · {preview.length} séances</div>
            </div>
            {!assigned
              ?<Btn icon="calendar-plus" onClick={assign} style={{background:forfait.couleur||'var(--v)',border:'none',boxShadow:`0 2px 8px ${forfait.couleur||'#7733dd'}44`}}>Assigner au calendrier</Btn>
              :<div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:13,fontWeight:600,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}><Icon n="check-circle" s={16} c="var(--green)"/>{preview.length} séances ajoutées !</span>
                <Btn variant="secondary" onClick={reset}>Nouveau programme</Btn>
              </div>
            }
          </div>
          {Array.from({length:forfait.semaines},(_,w)=>{
            const ws=preview.filter(s=>s._week===w+1);
            return(
              <div key={w} style={{background:'#fff',border:'1px solid var(--n150)',borderRadius:'var(--rxl)',overflow:'hidden',boxShadow:'var(--sh-sm)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 16px',background:'var(--n50)',borderBottom:'1px solid var(--n100)'}}>
                  <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:13.5,color:'var(--n900)'}}>Semaine {w+1}</span>
                  {ws[0]?.date&&<span style={{fontSize:11.5,color:'var(--n400)',fontFamily:'var(--fm)'}}>{new Date(ws[0].date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – {ws[ws.length-1]?.date&&new Date(ws[ws.length-1].date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>}
                </div>
                {ws.map((s,i)=>{
                  const t=TYPES[s.type]||TYPES.force;
                  return(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'9px 16px',borderBottom:i<ws.length-1?'1px solid var(--n50)':'none'}}>
                      <div style={{fontFamily:'var(--fm)',fontSize:11.5,color:'var(--n500)',width:90,flexShrink:0}}>{new Date(s.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
                      <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600,color:'var(--n900)'}}>{s.title}</div><div style={{fontSize:11.5,color:'var(--n400)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.notes}</div></div>
                      <span style={{fontSize:10.5,fontWeight:600,padding:'2px 8px',borderRadius:'var(--rpill)',background:t.soft,color:t.color,whiteSpace:'nowrap'}}>{t.label}</span>
                      <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:4,background:'var(--n50)',color:'var(--n400)',fontFamily:'var(--fm)',border:'1px solid var(--n150)',whiteSpace:'nowrap'}}>RPE {s._rpe}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* ── MODAL ÉDITEUR DE PROGRAMME ── */}
      {editOpen&&editForfait&&(
        <Modal open={editOpen} onClose={()=>setEditOpen(false)} title={editForfait.id.startsWith('c-')?'Nouveau programme':'Modifier le programme'} width={600}
          footer={<><Btn variant="ghost" onClick={()=>setEditOpen(false)}>Annuler</Btn><Btn onClick={saveEdit}>Enregistrer</Btn></>}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <Field label="Nom du programme"><FInput value={editForfait.nom} onChange={e=>setEditForfait(p=>({...p,nom:e.target.value}))} placeholder="ex : Force-Vitesse 6 semaines"/></Field>
              <Field label="Niveau / public"><FInput value={editForfait.niveau} onChange={e=>setEditForfait(p=>({...p,niveau:e.target.value}))} placeholder="Débutant, Avancé…"/></Field>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              <Field label="Durée (semaines)"><FInput type="number" value={editForfait.semaines} onChange={e=>setEditForfait(p=>({...p,semaines:Number(e.target.value)}))} placeholder="8"/></Field>
              <Field label="Séances/semaine"><FInput type="number" value={editForfait.joursParSem} onChange={e=>setEditForfait(p=>({...p,joursParSem:Number(e.target.value)}))} placeholder="4"/></Field>
              <Field label="Prix (€)"><FInput type="number" value={editForfait.prix} onChange={e=>setEditForfait(p=>({...p,prix:Number(e.target.value)}))} placeholder="350"/></Field>
            </div>
            <Field label="Description courte">
              <textarea value={editForfait.description} onChange={e=>setEditForfait(p=>({...p,description:e.target.value}))} rows={2} placeholder="Objectif principal du programme…" style={{padding:'8px 12px',border:'1px solid var(--n200)',borderRadius:'var(--rmd)',fontSize:13.5,resize:'vertical',fontFamily:'var(--fb)',outline:'none',lineHeight:1.5,width:'100%'}}/>
            </Field>
            <Field label="Objectifs (un par ligne)">
              <textarea value={(editForfait.objectifs||[]).join('\n')} onChange={e=>setEditForfait(p=>({...p,objectifs:e.target.value.split('\n')}))} rows={3} placeholder="VO2max +10%&#10;Force +15%&#10;Prévention blessures" style={{padding:'8px 12px',border:'1px solid var(--n200)',borderRadius:'var(--rmd)',fontSize:13.5,resize:'vertical',fontFamily:'var(--fb)',outline:'none',lineHeight:1.5,width:'100%'}}/>
            </Field>
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <label style={{fontSize:13,fontWeight:600,color:'var(--n900)'}}>Séances du microcycle</label>
                <Btn size="sm" variant="ghost" icon="plus" onClick={()=>setEditForfait(p=>({...p,microcycle:[...p.microcycle,{jour:(p.microcycle.length||0)+1,type:'force',titre:'',duree:1,rpe:7,contenu:''}]}))}>Ajouter</Btn>
              </div>
              {(editForfait.microcycle||[]).map((m,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'40px 80px 80px 80px 1fr 32px',gap:8,marginBottom:8,alignItems:'start'}}>
                  <Field label={i===0?'Jour':''}><FInput type="number" value={m.jour} onChange={e=>setEditForfait(p=>{const mc=[...p.microcycle];mc[i]={...mc[i],jour:Number(e.target.value)};return{...p,microcycle:mc};})}/></Field>
                  <Field label={i===0?'Type':''}>
                    <FSel value={m.type} onChange={e=>setEditForfait(p=>{const mc=[...p.microcycle];mc[i]={...mc[i],type:e.target.value};return{...p,microcycle:mc};})}>
                      {Object.entries(TYPES).map(([k,t])=><option key={k} value={k}>{t.label}</option>)}
                    </FSel>
                  </Field>
                  <Field label={i===0?'Durée':''}><FInput type="number" value={m.duree} step="0.25" onChange={e=>setEditForfait(p=>{const mc=[...p.microcycle];mc[i]={...mc[i],duree:Number(e.target.value)};return{...p,microcycle:mc};})}/></Field>
                  <Field label={i===0?'RPE':''}><FInput type="number" value={m.rpe} min="1" max="10" onChange={e=>setEditForfait(p=>{const mc=[...p.microcycle];mc[i]={...mc[i],rpe:Number(e.target.value)};return{...p,microcycle:mc};})}/></Field>
                  <Field label={i===0?'Titre':''} style={{gridColumn:'5'}}>
                    <FInput value={m.titre} onChange={e=>setEditForfait(p=>{const mc=[...p.microcycle];mc[i]={...mc[i],titre:e.target.value};return{...p,microcycle:mc};})} placeholder="Force — Bas du corps"/>
                  </Field>
                  <div style={{paddingTop:i===0?22:0}}>
                    <button onClick={()=>setEditForfait(p=>({...p,microcycle:p.microcycle.filter((_,j)=>j!==i)}))} style={{border:'none',background:'transparent',cursor:'pointer',padding:4,borderRadius:'var(--rsm)'}}><Icon n="x" s={14} c="var(--n300)"/></button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
/* ── APP ── */
function App(){
  const [screen,setScreen]=React.useState('home');
  const [sess,setSess]=React.useState({open:false,prefill:null});
  const [cliModal,setCliModal]=React.useState(false);
  const openSess=(prefill=null)=>setSess({open:true,prefill});
  const closeSess=()=>setSess({open:false,prefill:null});
  return(
    <StoreProvider>
      <Shell screen={screen} setScreen={setScreen} onNewSession={openSess}>
        {screen==='home'        &&<HomeScreen onNewClient={()=>setCliModal(true)} onNewSession={openSess}/>}
        {screen==='calendar'    &&<CalendarScreen onNewSession={openSess}/>}
        {screen==='clients'     &&<ClientsScreen onAdd={()=>setCliModal(true)}/>}
        {screen==='performance' &&<PerformanceScreen/>}
        {screen==='finances'    &&<FinancesScreen/>}
        {screen==='programs'    &&<ProgramsScreen/>}
        <SessionModal open={sess.open} onClose={closeSess} prefill={sess.prefill}/>
        <ClientModal open={cliModal} onClose={()=>setCliModal(false)} editClient={null}/>
      </Shell>
    </StoreProvider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
